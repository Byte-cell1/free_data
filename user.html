<script>
const firebaseConfig = {
  apiKey: "AIzaSyCY75Whxe2i9ITdxWctl-LwmCxPugv9pk0",
  authDomain: "chatcall-app-99bde.firebaseapp.com",
  databaseURL: "https://chatcall-app-99bde-default-rtdb.firebaseio.com",
  projectId: "chatcall-app-99bde",
  storageBucket: "chatcall-app-99bde.firebasestorage.app",
  messagingSenderId: "565789395277",
  appId: "1:565789395277:web:02c9fb0bb869873b208f04"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

let currentUser = null;
let currentGift = null;
let adminUid = null;
let userClaims = {};

// Wheel data
const wheelSegments = [
  {type:'Truth', color:'#00c896'},
  {type:'Dare', color:'#ff9500'},
  {type:'Truth', color:'#00c896'},
  {type:'Dare', color:'#ff9500'},
  {type:'Truth', color:'#00c896'},
  {type:'Dare', color:'#ff9500'},
  {type:'Truth', color:'#00c896'},
  {type:'Dare', color:'#ff9500'}
];

const truthQuestions = [
  "What's your biggest fear?",
  "Who was your first crush?",
  "What's the most embarrassing thing you did?",
  "Have you ever lied to your best friend?",
  "What's one secret nobody knows?",
  "What's your most awkward date story?",
  "If you could swap lives for a day, whose would it be?",
  "What's the worst gift you ever received?"
];

const dareQuestions = [
  "Do 10 pushups right now",
  "Send a funny selfie in chat",
  "Sing any song for 10 seconds",
  "Compliment the last person who messaged you",
  "Dance for 15 seconds",
  "Draw a cat on your hand and show it",
  "Talk like a robot for next 3 messages",
  "Do your best funny face and screenshot it"
];

let wheelRotation = 0;
let wheelSpinsToday = 3;
let wheelCanvas, wheelCtx;

function drawWheel(){
  if(!wheelCtx) return;
  const center = 140;
  const radius = 120;
  const angle = (2 * Math.PI) / wheelSegments.length;

  wheelCtx.clearRect(0,0,280,280);
  wheelCtx.save();
  wheelCtx.translate(center, center);
  wheelCtx.rotate(wheelRotation);

  wheelSegments.forEach((seg, i)=>{
    wheelCtx.beginPath();
    wheelCtx.moveTo(0,0);
    wheelCtx.arc(0,0,radius,i*angle,(i+1)*angle);
    wheelCtx.fillStyle = seg.color;
    wheelCtx.fill();

    wheelCtx.save();
    wheelCtx.rotate(i*angle + angle/2);
    wheelCtx.textAlign = 'center';
    wheelCtx.fillStyle = '#fff';
    wheelCtx.font = 'bold 16px Segoe UI';
    wheelCtx.fillText(seg.type, radius-35, 5);
    wheelCtx.restore();
  });
  wheelCtx.restore();
}

function spinWheel(){
  if(wheelSpinsToday <= 0){
    document.getElementById('wheelResult').textContent = 'No spins left. Watch ad or share to get more!';
    document.getElementById('questionBox').textContent = '';
    return;
  }

  const btn = document.getElementById('spinWheelBtn');
  btn.disabled = true;
  document.getElementById('wheelResult').textContent = 'Spinning...';
  document.getElementById('questionBox').textContent = '';

  const spins = 4 + Math.random() * 3;
  const targetAngle = Math.random() * 2 * Math.PI;
  const finalRotation = wheelRotation + spins * 2 * Math.PI + targetAngle;

  let start = null;
  function animate(timestamp){
    if(!start) start = timestamp;
    const progress = Math.min((timestamp - start) / 3000, 1);
    const ease = 1 - Math.pow(1 - progress, 3);
    wheelRotation = wheelRotation + (finalRotation - wheelRotation) * ease;
    drawWheel();

    if(progress < 1){
      requestAnimationFrame(animate);
    } else {
      wheelRotation = finalRotation;
      const segAngle = (2 * Math.PI) / wheelSegments.length;
      const selectedIndex = Math.floor(((2*Math.PI) - (finalRotation % (2*Math.PI))) / segAngle) % wheelSegments.length;
      const result = wheelSegments[selectedIndex].type;

      wheelSpinsToday -= 1;
      document.getElementById('wheelSpins').textContent = wheelSpinsToday;
      document.getElementById('wheelResult').textContent = `Result: ${result}!`;

      const questions = result === 'Truth'? truthQuestions : dareQuestions;
      const question = questions[Math.floor(Math.random() * questions.length)];
      document.getElementById('questionBox').textContent = question;

      btn.disabled = false;

      const today = new Date().toDateString();
      if(currentUser){
        db.ref('wheelSpins/'+currentUser.uid+'/'+today).set({
          count: wheelSpinsToday,
          lastResult: result,
          lastQuestion: question,
          lastSpin: Date.now()
        });
      }
    }
  }
  requestAnimationFrame(animate);
}

// BUTTON 1: Earn spin via Ad
function watchAdSpin(){
  wheelSpinsToday += 1;
  document.getElementById('wheelSpins').textContent = wheelSpinsToday;
  document.getElementById('wheelResult').textContent = '📺 +1 spin added!';
  document.getElementById('questionBox').textContent = '';
  const today = new Date().toDateString();
  if(currentUser) db.ref('wheelSpins/'+currentUser.uid+'/'+today+'/count').set(wheelSpinsToday);
}

// BUTTON 2: Earn spins via Share
function shareSpin(){
  const shareUrl = window.location.href;
  if(navigator.share){
    navigator.share({title:'Truth or Dare Game', text:'Play this fun game with me:', url:shareUrl})
 .then(()=>{
      wheelSpinsToday += 2;
      document.getElementById('wheelSpins').textContent = wheelSpinsToday;
      document.getElementById('wheelResult').textContent = '🔗 +2 spins added!';
      document.getElementById('questionBox').textContent = '';
      const today = new Date().toDateString();
      if(currentUser) db.ref('wheelSpins/'+currentUser.uid+'/'+today+'/count').set(wheelSpinsToday);
    })
 .catch(()=>{});
  } else {
    navigator.clipboard.writeText(shareUrl);
    wheelSpinsToday += 2;
    document.getElementById('wheelSpins').textContent = wheelSpinsToday;
    document.getElementById('wheelResult').textContent = '🔗 Link copied! +2 spins added!';
    document.getElementById('questionBox').textContent = '';
    const today = new Date().toDateString();
    if(currentUser) db.ref('wheelSpins/'+currentUser.uid+'/'+today+'/count').set(wheelSpinsToday);
  }
}

// BUTTON 3: Reset spins for testing
function resetSpins(){
  if(confirm('Reset your spins to 3 for today?')){
    wheelSpinsToday = 3;
    document.getElementById('wheelSpins').textContent = 3;
    document.getElementById('wheelResult').textContent = 'Spins reset!';
    document.getElementById('questionBox').textContent = '';
    const today = new Date().toDateString();
    if(currentUser) db.ref('wheelSpins/'+currentUser.uid+'/'+today+'/count').set(3);
  }
}

function switchTab(tab){
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('authError').style.display = 'none';
  if(tab === 'login'){
    document.querySelectorAll('.tab')[0].classList.add('active');
    document.getElementById('loginForm').style.display = 'block';
    document.getElementById('signupForm').style.display = 'none';
  } else {
    document.querySelectorAll('.tab')[1].classList.add('active');
    document.getElementById('loginForm').style.display = 'none';
    document.getElementById('signupForm').style.display = 'block';
  }
}

function showError(msg){document.getElementById('authError').textContent=msg;document.getElementById('authError').style.display='block'}

async function userLogin(){
  const email=document.getElementById('loginEmail').value.trim();
  const password=document.getElementById('loginPassword').value;
  const btn=document.getElementById('loginBtn');
  btn.disabled=true;btn.textContent='Logging in...';
  try{
    const cred=await auth.signInWithEmailAndPassword(email,password);
    loginSuccess(cred.user);
  }catch(err){showError(err.message);btn.disabled=false;btn.textContent='Login'}
}

async function userSignup(){
  const email=document.getElementById('signupEmail').value.trim();
  const password=document.getElementById('signupPassword').value;
  const btn=document.getElementById('signupBtn');
  if(password.length<6){showError('Password must be 6+ characters');return}
  btn.disabled=true;btn.textContent='Creating...';
  try{
    const cred=await auth.createUserWithEmailAndPassword(email,password);
    await db.ref('users/'+cred.user.uid).set({email:email,role:'user',online:true,joined:Date.now()});
    document.getElementById('authSuccess').textContent='Account created! Logging in...';
    document.getElementById('authSuccess').style.display='block';
    setTimeout(()=>loginSuccess(cred.user),1500);
  }catch(err){showError(err.message);btn.disabled=false;btn.textContent='Sign Up'}
}

async function loginSuccess(user){
  currentUser=user;
  document.getElementById('userEmail').textContent=user.email;
  document.getElementById('authScreen').style.display='none';
  document.getElementById('dashboard').style.display='block';
  document.getElementById('wheelGame').style.display='block';
  db.ref('users/'+user.uid).update({online:true,lastSeen:Date.now()});

  wheelCanvas = document.getElementById('wheelCanvas');
  wheelCtx = wheelCanvas.getContext('2d');

  const today = new Date().toDateString();
  db.ref('wheelSpins/'+user.uid+'/'+today+'/count').once('value').then(snap=>{
    wheelSpinsToday = snap.val()!== null? snap.val() : 3;
    document.getElementById('wheelSpins').textContent = wheelSpinsToday;
    drawWheel();
  });

  const adminSnap=await db.ref('users').orderByChild('role').equalTo('admin').limitToFirst(1).once('value');
  adminSnap.forEach(child=>adminUid=child.key);

  loadGifts();
  loadChat();
  listenDeliveryStatus();
}

function logout(){
  if(currentUser) db.ref('users/'+currentUser.uid).update({online:false});
  document.getElementById('wheelGame').style.display='none';
  auth.signOut().then(()=>location.reload());
}

function resetApp(){
  if(!confirm('Reset app? This will logout and clear browser cache. Your data in Firebase is safe.')) return;
  auth.signOut();
  localStorage.clear();
  sessionStorage.clear();
  if(window.indexedDB){
    indexedDB.databases().then(dbs => {
      dbs.forEach(db => {if(db.name) indexedDB.deleteDatabase(db.name)});
    });
  }
  alert('Reset complete. Reloading...');
  setTimeout(()=>location.reload(true), 1000);
}

function loadGifts(){
  db.ref('dataLinks').on('value',snap=>{
    const list=document.getElementById('giftsList');
    list.innerHTML='';
    if(!snap.exists()){list.innerHTML='<div style="text-align:center;color:#666;padding:40px">No gifts available yet</div>';return}
    snap.forEach(child=>{
      const d=child.val();
      const div=document.createElement('div');
      div.className='gift-card';
      div.id='gift-'+child.key;
      div.innerHTML=`
        <h3>🎁 ${d.title}</h3>
        <div class="data-amount">${d.dataAmount} ${d.network}</div>
        <span class="network-badge">${d.network}</span>
        <span class="validity-badge">${d.validity}</span>
        <p class="gift-desc">${d.description||'Free data gift'}</p>
        <div id="status-${child.key}"></div>
        <div class="delivery-history" id="history-${child.key}" style="display:none"></div>
        <div class="btn-row" id="btn-${child.key}">
          <button class="btn btn-free" onclick="openModal('${child.key}','${d.title}','${d.dataAmount}','${d.network}','${d.validity}','${d.description||''}','free')">Claim Free</button>
          <button class="btn btn-support" onclick="openModal('${child.key}','${d.title}','${d.dataAmount}','${d.network}','${d.validity}','${d.description||''}','support')">Support ₦500</button>
        </div>
      `;
      list.appendChild(div);
    });
  });
}

function openModal(id,title,amount,network,validity,desc,type){
  currentGift={id,title,amount,network,validity};
  document.getElementById('modalTitle').textContent=title;
  document.getElementById('modalDesc').textContent=`${amount} ${network} - Valid for ${validity}`;
  document.getElementById('phoneInput').value='';
  document.getElementById('statusResult').style.display='none';
  if(type==='free'){
    document.getElementById('freeSection').style.display='block';
    document.getElementById('supportSection').style.display='none';
  }else{
    document.getElementById('freeSection').style.display='none';
    document.getElementById('supportSection').style.display='block';
  }
  document.getElementById('claimModal').classList.add('active');
}

function closeModal(){document.getElementById('claimModal').classList.remove('active')}

function validatePhone(phone){
  phone=phone.trim();
  if(!phone.match(/^0[789][01]\d{8}$/)) return false;
  return true;
}

function claimFree(){
  const phone=document.getElementById('phoneInput').value.trim();
  if(!validatePhone(phone)){alert('Enter valid Nigerian phone number: 0803xxxxxxx');return}
  const claimRef=db.ref('claims/'+currentGift.id+'/'+Date.now());
  claimRef.set({
    uid:currentUser.uid,
    email:currentUser.email,
    phone:phone,
    type:'free',
    amount:0,
    giftTitle:currentGift.title,
    dataAmount:currentGift.amount,
    network:currentGift.network,
    time:Date.now(),
    status:'pending',
    delivered:false
  });
  document.getElementById('statusResult').innerHTML=`<div class="delivery-status delivery-pending">✓ Free claim submitted. Admin will deliver ${currentGift.amount} ${currentGift.network} soon.</div>`;
  document.getElementById('statusResult').style.display='block';
  document.getElementById('freeSection').style.display='none';
  setTimeout(closeModal,2500);
}

  const phone=document.getElementById('phoneInput').value.trim();
  if(!validatePhone(phone)){alert('Enter valid Nigerian phone number: 0803xxxxxxx');return}
  const handler=PaystackPop.setup({
    key:'pk_test_xxx',
    email:currentUser.email,
    amount:50000,
    ref:''+Math.floor(Math.random()*1000000+1),
    callback:function(response){
      db.ref('claims/'+currentGift.id+'/'+Date.now()).set({
        uid:currentUser.uid,
        email:currentUser.email,
        phone:phone,
        type:'support',
        ref:response.reference,
        amount:500,
        giftTitle:currentGift.title,
        dataAmount:currentGift.amount,
        network:currentGift.network,
        time:Date.now(),
        status:'paid',
        delivered:false
      });
      document.getElementById('statusResult').innerHTML=`<div class="delivery-status delivery-pending">✓ Payment successful. Waiting for admin to send ${currentGift.amount} ${currentGift.network}...</div>`;
      document.getElementById('statusResult').style.display='block';
      document.getElementById('supportSection').style.display='none';
      setTimeout(closeModal,2500);
    },
    onClose:function(){}
  });
  handler.openIframe();
}

function listenDeliveryStatus(){
  if(!currentUser)return;
  db.ref('claims').on('value',snap=>{
    userClaims={};
    snap.forEach(giftSnap=>{
      giftSnap.forEach(claimSnap=>{
        const c=claimSnap.val();
        if(c.uid===currentUser.uid){
          if(!userClaims[giftSnap.key]) userClaims[giftSnap.key]=[];
          userClaims[giftSnap.key].push({...c, claimId:claimSnap.key});
        }
      });
    });
    updateAllGiftStatus();
  });
}

function updateAllGiftStatus(){
  Object.keys(userClaims).forEach(giftId=>{
    const claims=userClaims[giftId];
    const statusDiv=document.getElementById('status-'+giftId);
    const btnDiv=document.getElementById('btn-'+giftId);
    const historyDiv=document.getElementById('history-'+giftId);
    if(!statusDiv) return;
    const deliveredClaim=claims.find(c=>c.delivered);
    const paidClaim=claims.find(c=>c.status==='paid' &&!c.delivered);
    const pendingClaim=claims.find(c=>c.status==='pending' &&!c.delivered);
    if(deliveredClaim){
      const time=new Date(deliveredClaim.deliveredAt).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      statusDiv.innerHTML=`<div class="delivery-status">✓ ${deliveredClaim.dataAmount} ${deliveredClaim.network} delivered by admin at ${time}</div>`;
      if(btnDiv) btnDiv.style.display='none';
    }else if(paidClaim){
      statusDiv.innerHTML=`<div class="delivery-status delivery-pending">⏳ Payment confirmed. Waiting for admin to deliver ${paidClaim.dataAmount} ${paidClaim.network}...</div>`;
    }else if(pendingClaim){
      document.getElementById('status-'+giftId).innerHTML=`<div class="delivery-status delivery-pending">⏳ Free claim submitted. Waiting for admin delivery...</div>`;
    }
    if(claims.length>0){
      historyDiv.style.display='block';
      historyDiv.innerHTML='<strong style="font-size:13px;color:#aaa">Delivery History:</strong>';
      claims.sort((a,b)=>b.time-a.time).forEach(c=>{
        const t=new Date(c.time).toLocaleString();
        const status=c.delivered?`Delivered at ${new Date(c.deliveredAt).toLocaleTimeString()}`:c.status==='paid'?'Paid, waiting delivery':'Pending';
        historyDiv.innerHTML+=`<div class="history-item">${t} - ${c.type==='support'?'₦500 Support':'Free'} - ${status}</div>`;
      });
    }
  });
}

function loadChat(){
  if(!currentUser)return;
  if(!adminUid){setTimeout(loadChat,1000);return}
  const chatId=[currentUser.uid,adminUid].sort().join('_');
  db.ref('chats/'+chatId).limitToLast(30).on('value',snap=>{
    const box=document.getElementById('chatBox');
    box.innerHTML='';
    snap.forEach(child=>{
      const d=child.val();
      const div=document.createElement('div');
      div.className='msg '+(d.from===currentUser.uid?'user':'admin');
      const time=new Date(d.time).toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
      div.innerHTML=`${d.text}<div class="msg-time">${time}</div>`;
      box.appendChild(div);
    });
    box.scrollTop=box.scrollHeight;
  });
}

function sendMessage(){
  const msg=document.getElementById('chatInput').value.trim();
  if(!msg){alert('Type a message first');return}
  if(!currentUser||!adminUid){alert('Refresh page');return}
  const chatId=[currentUser.uid,adminUid].sort().join('_');
  db.ref('chats/'+chatId).push({from:currentUser.uid,text:msg,time:Date.now()})
.then(()=>{document.getElementById('chatInput').value=''})
.catch(err=>{alert('Send failed: '+err.message)});
}

auth.onAuthStateChanged(user=>{
  if(user&&document.getElementById('dashboard').style.display!=='block'){
    db.ref('users/'+user.uid).once('value',snap=>{
      if(snap.val()?.role==='user')loginSuccess(user);
    });
  }
});

document.getElementById('claimModal').addEventListener('click',e=>{
  if(e.target.id==='claimModal')closeModal();
});
document.getElementById('chatInput').addEventListener('keypress',e=>{
  if(e.key==='Enter')sendMessage();
});
</script>

<script>if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js');</script>
